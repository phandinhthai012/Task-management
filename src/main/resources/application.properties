spring.application.name=Task-management-api

# Database configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TaskManagementDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect


# JWT Configuration
jwt.secret=my-super-secret-key-123456789012-must-be-very-long-and-secure
jwt.expiration=86400000

